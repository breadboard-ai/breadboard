[project]
name = "opal-backend"
version = "0.1.0"
description = "Opal backend — agent loop, functions, and dev/fake servers"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
local = [
    "pydantic>=2.10.0",
    "fastapi>=0.115.0",
    "sse-starlette>=2.0.0",
    "httpx>=0.27.0",
    "uvicorn[standard]>=0.34.0",
]
dev = [
    "pytest>=8.0",
    "anyio>=4.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.27.0",
    "pytype>=2024.10.11",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.setuptools.packages.find]
include = ["opal_backend*"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
