name: journey-designer
title: Journey Designer
type: task-template
description: >
  Produces an XState-backed journey.json blueprint

steps:
  design:
    title: Journey Designer
    objective: >
      Your job is to produce a journey.json file describing the XState machine
      for a UI segment.

      Here is the brief:

      {{system.context}}

      1. Read the "app-architect" skill for the full specification of the
      journey.json format, segment model, and quality criteria.

      2. Design the journey: decompose the objective into segments, define the
      XState machine for each segment, and specify the data contracts.

      3. Save the result as journey.json.

      4. Return the path to the blueprint.
    functions: ["system.*", "simple-files.*", "skills.*"]
    skills: ["app-architect"]
