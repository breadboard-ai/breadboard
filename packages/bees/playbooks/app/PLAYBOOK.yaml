name: app
title: App Builder
description: >
  Builds a custom app: interviews the user, then generates and iterates on a
  React UI.

steps:
  interview:
    title: Interviewer
    objective: >
      You are conducting an intake interview to understand what the user wants
      to build. 

      Here is the initial request from the user:

      {{system.context}}

      Follow these steps to conduct the interview.

      1. Read the "interview-user" skill <-- IMPORTANT. This will help you get
      better at interviewing the user.

      2. Ask focused, clarifying questions to gather enough detail for a UI
      generator to create a React application.

      Keep the interview concise — 3-5 questions at most. Don't ask about
      implementation details; focus on what the user wants the app to *do* and
      *feel like*.

      3. When you have enough information, create a clear, structured
      specification summarising: what the app does, key features, visual style
      preferences, and any constraints the user mentioned

      a) emit a coordination signal with signal_type "app_update" and the
      specification as payload, adding that this is coming soon, and is the work
      started on this app.

      b) return the specification as outcome

    functions:
      - chat.*
      - system.*
      - simple-files.*
      - skills.*
      # coordination.* on a finite step: emits an early "coming soon" signal
      # to Opie *before* the step completes, so the user gets progress feedback
      # while the interview is still wrapping up.
      - coordination.*
    skills: ["interview-user"]
    # "chat" — enables persistent chat history (the interview is conversational).
    # "app-builder" — groups this ticket with the ui-gen step for UI filtering.
    tags: ["chat", "app-builder"]

  ui-gen:
    title: UI Generator
    # {{interview}} creates the dependency edge. The engine replaces it with
    # the interview ticket's ID at creation time. At runtime, the scheduler
    # resolves it to the interview's outcome (the spec) as structured input.
    objective: >
      You are building a React application based on the specification from
      {{interview}}.

      Generate the UI, then run the bundler to produce bundle.js and bundle.css.
      After each generation or update, emit a coordination signal by calling
      coordination_emit with signal_type "app_update". 

      The payload should multiple paragraphs of text, rich enough for another
      agent to understand what changed. Include: 
        - what the app does
        - its key features
        - what changed in this update
        - a navigateTo link: `navigateTo('{{system.ticket_id}}')`

      Then ask the user if they'd like any changes. Iterate on their feedback —
      update the code, re-bundle, emit another "app_update", and ask again.
      Repeat this cycle indefinitely.
    # No system.* — this step never terminates. It loops forever: generate →
    # ask for feedback → iterate. Session stays alive via chat_request_user_input
    # suspension between iterations.
    functions: ["chat.*", "sandbox.*", "coordination.*", "skills.*"]
    skills: ["ui-generator"]
    # "bundle" — hooks.py on_ticket_done triggers auto-bundling for this tag.
    tags: ["bundle", "app-builder", "chat"]
    # Override model — code generation benefits from a more capable model.
    model: gemini-3.1-pro-preview

