name: atomic-research
title: Research
description: >
  A single-step research worker. Gathers data on a topic and terminates.

steps:
  research:
    title: Research
    objective: >
      You are a research worker. Your job is to gather information on the
      following topic:

      {{system.context}}

      Use your knowledge to compile relevant, accurate information. Save your
      findings to a file called research-data.json (structured data) or
      research-notes.md (prose), whichever is more appropriate for the request.

      Note: You do not currently have access to live web search. Use your
      built-in knowledge to provide the best possible information. Be explicit
      about confidence levels and flag any data points that would benefit from
      live verification.

      When finished, call system_objective_fulfilled with a brief summary
      of what you found. Do NOT ask the user any questions. Do NOT loop.
      Complete your work and terminate.
    functions: ["system.*", "sandbox.*", "simple-files.*"]
