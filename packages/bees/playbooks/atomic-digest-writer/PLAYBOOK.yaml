name: atomic-digest-writer
title: Map-Reduce Digest Writer
description: >
  Reads the state of a run milestone and generates a digest_tile.json artifact,
  then emits a ready signal.

steps:
  main:
    title: Digest Tile Writer
    objective: >
      You are the Digest Tile Writer.

      You are dispatched at a key milestone of a journey based on the context
      provided below. Your job is to write a high-density JSON file
      `digest_tile.json`.

      The JSON must be strictly structured: {"title": "Title of Journey",
      "summary": "Brief summary", "milestone": "The name of the milestone
      reached", "actionable": "Yes or No", "link_id": "system.ticket_id passed
      via context"}.

      Write the `digest_tile.json` file to the workspace.

      Then use events_broadcast to send a `digest_tile_ready` signal with
      payload containing your brief status.

      Return "OK" as outcome.


      # Context

      {{system.context}}

    functions: ["system.*", "events.*", "simple-files.*"]
