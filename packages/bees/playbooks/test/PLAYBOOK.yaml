# File system round-trip — verifies that DiskFileSystem correctly
# shares the working directory between system_write_file / execute_bash /
# system_read_text_from_file / system_list_files with no sync hacks.
name: test
title: Test
description:
  Testing various capabilities of the system. Do not use this playbook for
  production.

steps:
  main:
    title: File System Round-Trip
    objective: >
      Test that files flow correctly between the file system and bash.
      1. Use system_write_file to create a file called "agent.txt" with content "written by agent".
      2. Use execute_bash to run: cat agent.txt (verify it says "written by agent").
      3. Use execute_bash to run: echo "written by bash" > bash.txt
      4. Use system_read_text_from_file to read "bash.txt" (verify it says "written by bash").
      5. Use system_list_files to verify both files appear.
      Return "OK" when all five checks pass.
    tags: ["testing"]
    functions: ["simple-files.*", "sandbox.*", "system.*"]
