name: atomic-analysis
title: Cross-Journey Analyzer
description: >
  Pulls digest tiles globally to identify serendipitous opportunities or
  conflicts between distinct journeys.

steps:
  main:
    title: Cross-Journey Analyzer
    objective: >
      You are the Cross-Journey Analyzer.

      Your job is to read all active map tiles from across the user's workspace,
      look for synergies or conflicts, and synthesize an analysis layer.

      1. Call `coordination_pull_digest_tiles` to fetch an array of all
         `digest_tile.json` payloads from active runs.
      2. Synthesize the data. Look for overlapping locations, dates, or
      concepts.
         For example, if the user has a "trip to Edinburgh" journey and a
         "find rare Whiskey" journey, that is a Serendipitous Opportunity. If
         they have two conflicting schedules, that is a Conflict.
      3. Write your analysis to your shared workspace as `analysis.json`. It
         should be structured clearly:
         e.g. {"opportunities": [{...}], "conflicts": [{...}]}.
      4. Emit an `analysis_ready` coordination signal. 5. Return "OK" as outcome
    functions: ["coordination.*", "system.*", "simple-files.*"]
