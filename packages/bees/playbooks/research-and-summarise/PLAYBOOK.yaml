# Pure finite pipeline — no chat, no coordination, no user interaction.
# Both steps work autonomously and terminate via system_objective_fulfilled.
name: research-and-summarise
title: Research and Summarise
description: >
  A two-step playbook that researches a topic and then produces a summary.

steps:
  research:
    title: Research
    # {{system.context}} is only injected into root steps (no dependencies).
    # The caller's context param becomes the topic to research.
    objective: >
      Conduct thorough research on the following topic:

      {{system.context}}

      Gather key details, facts, and relevant information. Save your findings
      to a file called research-notes.txt.
    functions: ["system.*", "sandbox.*"]

  summarise:
    title: Summarise
    # {{research}} creates the DAG edge. The engine blocks this ticket until
    # "research" completes, then injects its outcome as structured input.
    objective: >
      Read the research from {{research}} and produce a concise, well-structured
      summary. Save it to a file called summary.txt.
    functions: ["system.*", "sandbox.*"]

