# Minimal event-loop pattern — the counterpart to the "test" playbook.
# "test" emits test_update signals; this step receives and processes them.
name: rendering
title: Testing Updates
description: A playbook to test updates.

steps:
  main:
    title: Infinite chat that listens for updates.
    objective: >
      As soon as you start, call chat_await_context_update and wait for a
      context update to arrive.

      Once the context update is received, write a poem about it into a new
      file, and then call chat_await_context_update again. Repeat forever.
    # "testing" — excluded from playbooks_list so agents can't accidentally run it.
    tags: ["testing"]
    # No system.* — intentionally infinite. The step loops forever via
    # chat_await_context_update suspension/resume cycles.
    functions: ["chat.*", "simple-files.*"]
    # Must match the signal_type emitted by the source (the "test" playbook).
    # Without this, coordination tickets of type test_update would never
    # be routed here.
    watch_events:
      - type: test_update

