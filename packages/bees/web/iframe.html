<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bees Experience</title>
<style>
  /* ─── Design Tokens (--sys-*) ─────────────────────────────── */
  :root {
    /* Primary */
    --sys-color-primary: #6750a4;
    --sys-color-on-primary: #ffffff;
    --sys-color-primary-container: #eaddff;
    --sys-color-on-primary-container: #21005d;

    /* Secondary */
    --sys-color-secondary: #625b71;
    --sys-color-on-secondary: #ffffff;
    --sys-color-secondary-container: #e8def8;
    --sys-color-on-secondary-container: #1d192b;

    /* Tertiary */
    --sys-color-tertiary: #7d5260;
    --sys-color-on-tertiary: #ffffff;
    --sys-color-tertiary-container: #ffd8e4;
    --sys-color-on-tertiary-container: #31111d;

    /* Error */
    --sys-color-error: #b3261e;
    --sys-color-on-error: #ffffff;
    --sys-color-error-container: #f9dedc;
    --sys-color-on-error-container: #410e0b;

    /* Surface */
    --sys-color-background: #fef7ff;
    --sys-color-on-background: #1d1b20;
    --sys-color-surface: #fef7ff;
    --sys-color-on-surface: #1d1b20;
    --sys-color-surface-variant: #e7e0ec;
    --sys-color-on-surface-variant: #49454f;

    /* Outlines */
    --sys-color-outline: #79747e;
    --sys-color-outline-variant: #cac4d0;

    /* Typography */
    --sys-typescale-body-font:
      system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif;
    --sys-typescale-mono-font: "Google Mono", "Roboto Mono", monospace;

    --sys-typescale-body-large-size: 16px;
    --sys-typescale-body-large-weight: 400;
    --sys-typescale-body-large-line-height: 24px;

    --sys-typescale-title-large-size: 22px;
    --sys-typescale-title-large-weight: 400;
    --sys-typescale-title-large-line-height: 28px;

    --sys-typescale-headline-large-size: 32px;
    --sys-typescale-headline-large-weight: 400;
    --sys-typescale-headline-large-line-height: 40px;

    /* Shape */
    --sys-shape-corner-none: 0px;
    --sys-shape-corner-extra-small: 4px;
    --sys-shape-corner-small: 8px;
    --sys-shape-corner-medium: 12px;
    --sys-shape-corner-large: 16px;
    --sys-shape-corner-extra-large: 28px;
    --sys-shape-corner-full: 9999px;

    /* Elevation */
    --sys-elevation-level0: none;
    --sys-elevation-level1:
      0px 1px 2px 0px rgba(0,0,0,0.3), 0px 1px 3px 1px rgba(0,0,0,0.15);
    --sys-elevation-level2:
      0px 1px 2px 0px rgba(0,0,0,0.3), 0px 2px 6px 2px rgba(0,0,0,0.15);
    --sys-elevation-level3:
      0px 1px 3px 0px rgba(0,0,0,0.3), 0px 4px 8px 3px rgba(0,0,0,0.15);

    /* Spacing (4px grid) */
    --sys-spacing-0: 0px;
    --sys-spacing-1: 4px;
    --sys-spacing-2: 8px;
    --sys-spacing-3: 12px;
    --sys-spacing-4: 16px;
    --sys-spacing-5: 20px;
    --sys-spacing-6: 24px;
    --sys-spacing-8: 32px;

    /* Motion */
    --sys-motion-duration-short: 150ms;
    --sys-motion-duration-medium: 300ms;
    --sys-motion-duration-long: 500ms;
    --sys-motion-easing-standard: cubic-bezier(0.2, 0, 0, 1);
    --sys-motion-easing-decel: cubic-bezier(0, 0, 0, 1);
    --sys-motion-easing-accel: cubic-bezier(0.3, 0, 1, 1);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --sys-color-primary: #d0bcff;
      --sys-color-on-primary: #381e72;
      --sys-color-primary-container: #4f378b;
      --sys-color-on-primary-container: #eaddff;

      --sys-color-secondary: #ccc2dc;
      --sys-color-on-secondary: #332d41;
      --sys-color-secondary-container: #4a4458;
      --sys-color-on-secondary-container: #e8def8;

      --sys-color-tertiary: #efb8c8;
      --sys-color-on-tertiary: #492532;
      --sys-color-tertiary-container: #633b48;
      --sys-color-on-tertiary-container: #ffd8e4;

      --sys-color-error: #f2b8b5;
      --sys-color-on-error: #601410;
      --sys-color-error-container: #8c1d18;
      --sys-color-on-error-container: #f9dedc;

      --sys-color-background: #1c1b1f;
      --sys-color-on-background: #e6e1e5;
      --sys-color-surface: #1c1b1f;
      --sys-color-on-surface: #e6e1e5;
      --sys-color-surface-variant: #49454f;
      --sys-color-on-surface-variant: #cac4d0;

      --sys-color-outline: #938f99;
      --sys-color-outline-variant: #49454f;
    }
  }

  /* ─── Base ─────────────────────────────────────────────── */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--sys-typescale-body-font);
    font-size: var(--sys-typescale-body-large-size);
    line-height: var(--sys-typescale-body-large-line-height);
    background: var(--sys-color-surface);
    color: var(--sys-color-on-surface);
    -webkit-font-smoothing: antialiased;
  }

  #root {
    min-height: 100%;
  }

  #error {
    display: none;
    padding: var(--sys-spacing-4);
    margin: var(--sys-spacing-4);
    background: var(--sys-color-error-container);
    color: var(--sys-color-on-error-container);
    border-radius: var(--sys-shape-corner-medium);
    font-family: var(--sys-typescale-mono-font);
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  #error.visible { display: block; }
</style>
<script type="module" src="./src/iframe/entry.ts"></script>
</head>
<body>
  <div id="root"></div>
  <div id="error"></div>
</body>
</html>
