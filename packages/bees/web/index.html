<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Shared Design Tokens (mirrors iframe.html --cg-* system) ──── */
    :root {
      --cg-font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --cg-font-mono: 'JetBrains Mono', ui-monospace, monospace;
      --cg-color-surface-dim: #1a1b1e;
      --cg-color-surface: #1f2024;
      --cg-color-surface-container-lowest: #121316;
      --cg-color-surface-container: #232429;
      --cg-color-surface-container-high: #2b2c31;
      --cg-color-on-surface: #e5e1e6;
      --cg-color-on-surface-muted: #9a969e;
      --cg-color-primary: #a8c7fa;
      --cg-color-primary-container: #1b3a5c;
      --cg-color-on-primary-container: #c3deff;
      --cg-color-outline: #7a767e;
      --cg-color-outline-variant: #49454e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--cg-font-sans);
      background: var(--cg-color-surface-dim);
      color: var(--cg-color-on-surface);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <opal-shell></opal-shell>
  <script type="module" src="/src/shell/main.ts"></script>
</body>
</html>
