<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Component Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&family=Lora:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&family=Playfair+Display:wght@400;500;600;700;800&display=swap"

      #root {

        border-radius: 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        white-space: pre-wrap;
        max-width: 100%;
        overflow: auto;
      }
    </style>

  <body>
    <div id="root"></div>
    <div id="error"></div>
    <script type="module" src="/src/preview/iframe-entry.ts"></script>
