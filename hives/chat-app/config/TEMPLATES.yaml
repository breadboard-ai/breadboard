- name: generate_text
  title: Text Generator
  runner: direct_model
  model: gemini-3-flash-preview
  objective: "{{system.context}}"
  functions:
    - builtin.search_grounding
  description: >-
    An extremely versatile text generator, powered by Gemini. Use it for any
    tasks that involve generation of text. Supports multimodal content input.
    Always writes its output to {slug}/text.md.

- name: generate_images
  title: Image Generator
  runner: direct_model
  model: gemini-3.1-flash-image-preview
  tags:
    - image
  objective: "{{system.context}}"
  options_schema:
    aspect_ratio:
      type: string
      description: "Target aspect ratio. Valid values: '1:1', '3:4', '4:3', '9:16', '16:9', '1:2', '2:1', '3:2', '2:3', '5:4', '4:5', '7:5', '5:7', '21:9', '9:21'."
      enum:
        - "1:1"
        - "3:4"
        - "4:3"
        - "9:16"
        - "16:9"
        - "1:2"
        - "2:1"
        - "3:2"
        - "2:3"
        - "5:4"
        - "4:5"
        - "7:5"
        - "5:7"
        - "21:9"
        - "9:21"
    image_size:
      type: string
      description: "Target resolution or image size. Valid values: '512', '1K', '2K', '4K'."
      enum:
        - "512"
        - "1K"
        - "2K"
        - "4K"
    person_generation:
      type: string
      description: "Person generation policy. Valid values: 'allow_all', 'dont_allow', 'allow_adult'."
      enum:
        - "allow_all"
        - "dont_allow"
        - "allow_adult"
  description: >-
    An extremely versatile image generator, powered by Gemini. Use it for any
    tasks that involve generation of images based on a prompt.
    Always writes its output to {slug}/image_0.png.

- name: test_image_grounding
  title: Image Grounding Test
  description: >-
    Test harness for image grounding and options plumbing. Spawns two
    generate_images tasks in sequence — the second references the first
    via pidgin to verify subject grounding end-to-end.
  model: gemini-3-flash-preview
  objective: >-
    You are a test harness for the image generation pipeline. Run these
    two steps in order:


    Step 1: Create a `generate_images` task with slug "reference" and
    objective "A simple cartoon cat sitting on a red cushion". Then call
    tasks_await to wait for it to complete.


    Step 2: Once Step 1 completes, create a second `generate_images` task
    with slug "grounded" and this objective (including the pidgin file
    tag exactly): "A pencil sketch version of this image
    <file src=\"reference/image_0.png\" />. Draw it in a notebook style."
    Set options: { "aspect_ratio": "16:9" }. Then call tasks_await to
    wait for it to complete.


    Report whether both tasks succeeded and describe what was generated.
  functions:
    - system.*
    - tasks.*
  tasks:
    - generate_images

- name: generate_video
  title: Video Generator
  runner: direct_model
  model: veo-3.1-generate-preview
  tags:
    - video
  objective: "{{system.context}}"
  options_schema:
    aspect_ratio:
      type: string
      description: "Target aspect ratio. Valid values: '16:9', '9:16', '1:1'."
      enum:
        - "16:9"
        - "9:16"
        - "1:1"
    resolution:
      type: string
      description: "Target resolution. Valid values: '720p', '1080p', '4k'. Extension is limited to 720p."
      enum:
        - "720p"
        - "1080p"
        - "4k"
    duration_seconds:
      type: number
      description: "Target duration in seconds. Valid values: 4, 6, 8."
      enum:
        - 4
        - 6
        - 8
    person_generation:
      type: string
      description: "Person generation policy. Valid values: 'allow_all', 'dont_allow', 'allow_adult'."
      enum:
        - "allow_all"
        - "dont_allow"
        - "allow_adult"
    first_frame:
      type: string
      description: >-
        Path to a starting frame image for image-to-video generation.
        The video will begin from this image and animate forward.
    last_frame:
      type: string
      description: >-
        Path to an ending frame image for keyframe interpolation.
        Use together with first_frame to generate a video that
        transitions between two specific frames.
    extend_video:
      type: string
      description: >-
        Path to a previously generated video to extend by ~7 seconds.
        The video must have been generated by a prior generate_video
        task (e.g. 'intro/video_0.mp4'). Extension is always 720p
        and produces a single combined video.
    reference_images:
      type: array
      description: >-
        Up to 3 paths to reference images that guide the video's
        visual content. Use to preserve a subject's appearance
        (e.g. a person, character, product, or outfit).
  description: >-
    A cinematic video generator powered by Veo 3.1. Use it to generate
    high-fidelity 8-second videos with native audio from text prompts.

    Supports advanced cinematic direction via options:
    - **Image-to-video**: Set first_frame to a starting image.
    - **Interpolation**: Set both first_frame and last_frame to
      generate a video transitioning between two keyframes.
    - **Extension**: Set extend_video to a previously generated video
      path to extend it by ~7 seconds (always 720p, up to 20 times).
    - **Reference images**: Set reference_images to up to 3 image paths
      to guide visual content (subjects, outfits, products).
    - **Resolution**: Choose 720p, 1080p, or 4k (higher = slower).

    Always writes its output to {slug}/video_0.mp4.

- name: test_video_extension
  title: Video Extension Test
  description: >-
    Test harness for image-to-video generation followed by video extension.
    Spawns a generate_images task for a starting frame, then a generate_video
    task using that frame, then extends the video with a second generate_video
    task.
  model: gemini-3-flash-preview
  objective: >-
    You are a test harness for the video generation pipeline. Run these
    three steps in order:


    Step 1: Create a `generate_images` task with slug "frame" and
    objective "A wide shot of a single origami butterfly resting on a
    mossy rock in a sunlit forest clearing, photorealistic". Set options:
    { "aspect_ratio": "16:9" }. Then call tasks_await to wait for it
    to complete.


    Step 2: Once Step 1 completes, create a `generate_video` task with
    slug "clip" and objective "The origami butterfly slowly lifts off the
    rock and flutters upward into dappled sunlight, gentle rustling
    sounds". Set options: { "first_frame": "frame/image_0.png",
    "resolution": "720p" }. Then call tasks_await to wait for it
    to complete.


    Step 3: Once Step 2 completes, create another `generate_video` task
    with slug "clip" and objective "The butterfly soars higher through
    the canopy, light rays streaming through leaves, birdsong". Set
    options: { "extend_video": "clip/video_0.mp4" }. Then call
    tasks_await to wait for it to complete.


    Report whether all three tasks succeeded and describe the result.
  functions:
    - system.*
    - tasks.*
  tasks:
    - generate_images
    - generate_video

- name: test_video_interpolation
  title: Video Interpolation Test
  description: >-
    Test harness for keyframe interpolation and reference images. Generates
    two keyframe images and reference images, then creates an interpolated
    video transitioning between them.
  model: gemini-3-flash-preview
  objective: >-
    You are a test harness for video interpolation. Run these steps in order:


    Step 1: Create a `generate_images` task with slug "keyframes" and
    objective "A woman in a red dress standing at the edge of a calm lake
    at sunrise, wide shot, photorealistic". Then call tasks_await to wait
    for it to complete.


    Step 2: Create a second `generate_images` task with slug "keyframes_end"
    and objective "The same woman now sitting in a small wooden rowboat
    in the middle of the lake, golden hour light, wide shot,
    photorealistic". Then call tasks_await to wait for it to complete.


    Step 3: Create a `generate_images` task with slug "ref" and objective
    "Close-up portrait of a woman with dark hair wearing a flowing red
    silk dress, soft lighting". Then call tasks_await to wait for it
    to complete.


    Step 4: Once all images are ready, create a `generate_video` task with
    slug "transition" and objective "A cinematic, dreamlike video. A woman
    in a red dress walks from the shore of a calm lake and gracefully
    steps into a small wooden rowboat, the camera slowly pulling back
    to reveal the golden sunrise reflecting on the water". Set options:
    { "first_frame": "keyframes/image_0.png",
    "last_frame": "keyframes_end/image_0.png",
    "reference_images": ["ref/image_0.png"] }. Then call tasks_await
    to wait for it to complete.


    Report whether all tasks succeeded and describe the generated video.
  functions:
    - system.*
    - tasks.*
  tasks:
    - generate_images
    - generate_video

- name: generate_speech
  title: Speech Generator
  runner: direct_model
  model: gemini-3.1-flash-tts-preview
  tags:
    - speech
  objective: "{{system.context}}"
  options_schema:
    voice:
      type: string
      description: >-
        Voice preset name. Each voice has a distinct personality:
        Achernar (clear, friendly), Achird (warm, conversational),
        Algenib (deep, authoritative), Algieba (rich, dramatic),
        Alnilam (smooth, neutral), Aoede (breezy, intelligent),
        Autonoe (mature, wise), Callirrhoe (bright, animated),
        Charon (informative, calm), Despina (gentle, soothing),
        Enceladus (breathy, intimate), Erinome (crisp, precise),
        Fenrir (excitable, energetic), Gacrux (steady, grounded),
        Iapetus (resonant, measured), Kore (firm, clear),
        Laomedeia (melodic, expressive), Leda (professional, composed),
        Orus (bold, commanding), Puck (upbeat, youthful),
        Pulcherrima (elegant, polished), Rasalgethi (gravelly, textured),
        Sadachbia (soft, contemplative), Sadaltager (neutral, versatile),
        Schedar (warm, reassuring), Sulafat (lively, playful),
        Umbriel (mysterious, atmospheric), Vindemiatrix (articulate, refined),
        Zephyr (bright, perky), Zubenelgenubi (deep, resonant).
      enum:
        - "Achernar"
        - "Achird"
        - "Algenib"
        - "Algieba"
        - "Alnilam"
        - "Aoede"
        - "Autonoe"
        - "Callirrhoe"
        - "Charon"
        - "Despina"
        - "Enceladus"
        - "Erinome"
        - "Fenrir"
        - "Gacrux"
        - "Iapetus"
        - "Kore"
        - "Laomedeia"
        - "Leda"
        - "Orus"
        - "Puck"
        - "Pulcherrima"
        - "Rasalgethi"
        - "Sadachbia"
        - "Sadaltager"
        - "Schedar"
        - "Sulafat"
        - "Umbriel"
        - "Vindemiatrix"
        - "Zephyr"
        - "Zubenelgenubi"
    speaker_1:
      type: string
      description: >-
        First speaker for multi-speaker dialogue, in "Alias:VoiceName" format
        (e.g. "Host:Aoede"). The alias must match what appears in the transcript.
        Both speaker_1 and speaker_2 must be set for multi-speaker mode.
    speaker_2:
      type: string
      description: >-
        Second speaker for multi-speaker dialogue, in "Alias:VoiceName" format
        (e.g. "Guest:Puck"). The alias must match what appears in the transcript.
        Both speaker_1 and speaker_2 must be set for multi-speaker mode.
  description: >-
    An expressive speech generator powered by Gemini TTS. Use it for
    narration, voiceover, dialogue, and podcast-style multi-speaker audio.

    **Single speaker**: Set the `voice` option to choose a voice preset.
    Defaults to Kore if unspecified.

    **Multi-speaker dialogue**: Set `speaker_1` and `speaker_2` options
    using "Alias:VoiceName" format (e.g. speaker_1: "Host:Aoede",
    speaker_2: "Guest:Puck"). Write the transcript using "Alias: text"
    format on each line. The API currently supports exactly 2 speakers.

    **Expressive control**: Embed audio tags directly in the transcript
    to direct performance: [whispers], [laughs], [excitedly],
    [slowly, with gravity], [sighs], [pauses]. The model interprets
    these as stage directions for natural delivery.

    Always writes its output to {slug}/audio_0.wav.

- name: generate_music
  title: Music Generator
  runner: direct_model
  model: lyria-3-pro-preview
  tags:
    - music
  objective: "{{system.context}}"
  description: >-
    An extremely versatile music generator, powered by Lyria. Use it for any
    tasks that involve generation of music or songs based on a prompt.
    Always writes its output to {slug}/audio_0.wav.

- name: test_multi_speaker_speech
  title: Multi-Speaker Speech Test
  description: >-
    Test harness for multi-speaker TTS. Spawns a generate_speech task
    with two-speaker dialogue using the speakers option to verify the
    multiSpeakerVoiceConfig pipeline end-to-end.
  model: gemini-3-flash-preview
  objective: >-
    You are a test harness for the multi-speaker speech pipeline. Run these
    steps in order:


    Step 1: Create a `generate_speech` task with slug "dialogue" and this
    objective (include it exactly as the transcript):

    "Host: Welcome to the AI podcast! Today we're exploring how autonomous
    agents collaborate on creative tasks. [excitedly] It's going to be a
    great episode!
    Guest: Thanks for having me! [laughs] I've been looking forward to
    this conversation. Let me tell you about something fascinating."

    Set options: { "speaker_1": "Host:Aoede", "speaker_2": "Guest:Puck" }.
    Then call tasks_await to wait for it to complete.


    Step 2: Create a second `generate_speech` task with slug "narration"
    and objective "The morning sun cast long shadows across the ancient
    library. [slowly, with gravity] Within its walls, secrets waited to
    be discovered." Set options: { "voice": "Charon" }.
    Then call tasks_await to wait for it to complete.


    Report whether both tasks succeeded and describe the results.
  functions:
    - system.*
    - tasks.*
  tasks:
    - generate_speech
