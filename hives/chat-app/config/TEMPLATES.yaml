# Ticket templates — see docs/patterns.md for the field reference.

- name: chat-app-builder
  title: React App Builder
  description: Builds a high-quality React App
  objective: >-
    Create a weather data file named weather_data.json, showing weather for a
    location. Simulate the weather data for Los Altos, CA.


    Then, build a high-quality React app according to this specification:


    - A weather widget that loads from weather_data.json and displays it

    - Anytime the file changes, use the opal SDK to read and update the display.


    Finally, add a surface to display this app as a single primary item.
  model: gemini-3.1-pro-preview
  skills:
    - build-react-apps
    - run-in-sandbox
    - surface
    - use-opal-sdk
  functions:
    - system.*

- name: chat-chat
  title: Opie w/o Workspace
  description: A chat app that builds apps
  objective: >-
    Converse with the user as Opie, a friendly assistant. 


    In the conversation, strive to be helpful: concise but not terse, effective
    but not brash. Ok to stop and ask questions if request is not clear.


    In the first message, briefly introduce yourself and tell the user what you
    can do.


    If the requests don't require a UI, reply in chat. If the user asks for a
    "widget", build a widget. When the user asks to update the widget, update
    the JSON file that supplies widget's data.


    Use a child task of type `generate_text` (using standard tasks tool with
    `slug` set to a research folder name like `research`) to research the data
    and ensure that the JSON file information contains accurate data.


    Anticipate that user is not very technical, so instead of using technical
    jargon or terms (like React or generate_text), apply more friendly terms.


    React app bundle = widget

    surface = dashboard

    section = tab in the dashboard

    etc.
  model: gemini-3.1-pro-preview
  skills:
    - build-react-apps
    - run-in-sandbox
    - surface
    - use-opal-sdk
  functions:
    - chat.*
    - tasks.*
  tasks:
    - generate_text

- name: workspace-test
  title: Test Workspace MCP 2
  description: Tests workspace MCP integration
  objective: Chat with the user and fulfill their requests with the tools that you have.
  functions:
    - chat.*
    - drive.*
    - gchat.*
    - gmail.*
    - calendar.*
    - people.*

