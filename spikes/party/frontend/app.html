<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Party App</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --color-bg: #0f0f13;
        --color-surface: #1a1a24;
        --color-surface-alt: #22222e;
        --color-border: #2e2e3e;
        --color-text: #e8e8f0;
        --color-text-muted: #8888a0;
        --color-accent: #7c6cff;
        --color-accent-glow: rgba(124, 108, 255, 0.2);
        --color-success: #34d399;
        --color-danger: #f87171;
        --radius: 10px;
        --font: "Inter", system-ui, sans-serif;
      }

      html, body {
        height: 100%;
        background: var(--color-bg);
        color: var(--color-text);
        font-family: var(--font);
        font-size: 15px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      #root { height: 100%; }

      /* ── Component styles (shared with parent frame) ─────────── */

      .card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        padding: 16px;
      }

      .card h2 {
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--color-text-muted);
        margin-bottom: 12px;
      }

      input[type="text"] {
        width: 100%;
        padding: 8px 12px;
        background: var(--color-surface-alt);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        color: var(--color-text);
        font-family: var(--font);
        font-size: 14px;
        outline: none;
        transition: border-color 0.15s;
      }

      input[type="text"]:focus {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 2px var(--color-accent-glow);
      }

      textarea {
        width: 100%;
        padding: 12px;
        background: var(--color-surface-alt);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        color: var(--color-text);
        font-family: var(--font);
        font-size: 14px;
        line-height: 1.6;
        outline: none;
        resize: vertical;
        transition: border-color 0.15s;
      }

      textarea:focus {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 2px var(--color-accent-glow);
      }

      button {
        padding: 6px 14px;
        background: var(--color-accent);
        color: white;
        border: none;
        border-radius: 6px;
        font-family: var(--font);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      button:hover { opacity: 0.85; }

      .attribution {
        font-size: 11px;
        color: var(--color-text-muted);
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/react-app/entry.jsx"></script>
  </body>
</html>
