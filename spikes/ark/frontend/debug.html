<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ark — Debug</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color-scheme: light dark;
      }
      body {
        margin: 2rem;
        max-width: 800px;
      }

      /* Submission */
      #submit-form {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      #objective {
        flex: 1;
        padding: 0.5rem;
        font-size: 1rem;
      }

      /* Run list */
      #runs {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .run-card {
        border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
        border-radius: 6px;
        padding: 0.75rem 1rem;
        cursor: pointer;
        transition: background 0.15s;
      }
      .run-card:hover {
        background: color-mix(in srgb, currentColor 5%, transparent);
      }
      .run-card.selected {
        border-color: dodgerblue;
        background: color-mix(in srgb, dodgerblue 8%, transparent);
      }
      .run-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .run-objective {
        font-weight: 600;
      }
      .run-status {
        font-size: 0.85rem;
        opacity: 0.7;
      }
      .run-progress-bar {
        height: 4px;
        background: color-mix(in srgb, currentColor 10%, transparent);
        border-radius: 2px;
        margin-top: 0.5rem;
        overflow: hidden;
      }
      .run-progress-fill {
        height: 100%;
        background: dodgerblue;
        transition: width 0.3s ease;
      }
      .run-card[data-status="complete"] .run-progress-fill {
        background: green;
      }

      /* Detail panel */
      #detail {
        margin-top: 1.5rem;
      }
      #detail[hidden] {
        display: none;
      }
      #detail h2 {
        margin: 0 0 0.5rem;
        font-size: 1.1rem;
      }
      #events {
        list-style: none;
        padding: 0;
        max-height: 300px;
        overflow-y: auto;
      }
      #events li {
        padding: 0.25rem 0;
        border-bottom: 1px solid
          color-mix(in srgb, currentColor 10%, transparent);
        font-size: 0.9rem;
      }
      .start {
        font-weight: bold;
      }
      .done {
        color: green;
        font-weight: bold;
      }
      .error {
        color: red;
      }

      /* Artifacts */
      .artifacts {
        margin-top: 0.75rem;
      }
      .artifacts summary {
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
      }
      .artifacts ul {
        list-style: none;
        padding: 0;
        margin: 0.25rem 0 0;
      }
      .artifacts li {
        font-size: 0.8rem;
        padding: 0.15rem 0;
      }
      .artifacts a {
        color: dodgerblue;
      }
    </style>
  </head>
  <body>
    <h1>Ark</h1>

    <div id="submit-form">
      <input id="objective" type="text" placeholder="What should the UI do?" />
      <button id="start-btn">Generate</button>
    </div>

    <div id="runs"></div>

    <div id="detail" hidden>
      <h2>Events for <code id="detail-id"></code></h2>
      <ul id="events"></ul>
    </div>

    <script type="module">
      const BACKEND_URL = "http://localhost:8080";
      const POLL_INTERVAL_MS = 1000;

      const objectiveInput = document.querySelector("#objective");
      const startBtn = document.querySelector("#start-btn");
      const runsContainer = document.querySelector("#runs");
      const detailPanel = document.querySelector("#detail");
      const detailId = document.querySelector("#detail-id");
      const eventsList = document.querySelector("#events");

      let selectedRunId = null;
      let activeEventSource = null;

      // ── Submit ──────────────────────────────────────────────
      startBtn.addEventListener("click", async () => {
        const objective = objectiveInput.value.trim();
        if (!objective) return;
        objectiveInput.value = "";

        await fetch(`${BACKEND_URL}/agent/runs/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ objective, type: "ui" }),
        });
        startPolling();
      });

      objectiveInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") startBtn.click();
      });

      // ── Polling ─────────────────────────────────────────────
      let pollTimer = null;

      async function poll() {
        try {
          const res = await fetch(`${BACKEND_URL}/agent/runs/status`);
          const runs = await res.json();
          renderRunList(runs);

          // Stop polling when all runs are quiescent.
          const hasActive = runs.some((r) => r.status !== "complete");
          if (!hasActive) stopPolling();
        } catch {
          /* ignore transient errors */
        }
      }

      function startPolling() {
        if (pollTimer) return; // already polling
        poll(); // immediate first tick
        pollTimer = setInterval(poll, POLL_INTERVAL_MS);
      }

      function stopPolling() {
        if (!pollTimer) return;
        clearInterval(pollTimer);
        pollTimer = null;
      }

      function renderRunList(runs) {
        // Snapshot which artifact panels are open before re-rendering.
        const openDetails = new Set();
        for (const card of runsContainer.querySelectorAll(".run-card")) {
          const details = card.querySelector("details.artifacts");
          if (details?.open) openDetails.add(card.dataset.runId);
        }

        runsContainer.innerHTML = "";
        for (const run of runs) {
          const pct =
            run.total_steps > 0
              ? Math.round((run.progress / run.total_steps) * 100)
              : 0;

          const card = document.createElement("div");
          card.className = `run-card${run.id === selectedRunId ? " selected" : ""}`;
          card.dataset.status = run.status;
          card.dataset.runId = run.id;

          let artifactsHtml = "";
          if (run.artifacts && run.artifacts.length > 0) {
            const isOpen = openDetails.has(run.id) ? " open" : "";
            const links = run.artifacts
              .map(
                (f) =>
                  `<li><a href="${BACKEND_URL}/out/${run.id}/${f}" target="_blank">${f}</a></li>`
              )
              .join("");
            artifactsHtml = `
              <details class="artifacts"${isOpen}>
                <summary>📦 ${run.artifacts.length} artifacts</summary>
                <ul>${links}</ul>
              </details>
            `;
          }

          card.innerHTML = `
            <div class="run-header">
              <span class="run-objective">${escapeHtml(run.objective)}</span>
              <span class="run-status">${run.status === "complete" ? "✅ Done" : `⏳ ${run.current_step}`}</span>
            </div>
            <div class="run-progress-bar">
              <div class="run-progress-fill" style="width:${pct}%"></div>
            </div>
            ${artifactsHtml}
          `;
          // Only the header area triggers detail selection, not artifact links.
          card
            .querySelector(".run-header")
            .addEventListener("click", () => selectRun(run.id));
          runsContainer.appendChild(card);
        }
      }

      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      // One initial poll to pick up disk-hydrated runs, then stop.
      poll();

      // ── Detail / SSE ───────────────────────────────────────
      function selectRun(id) {
        if (selectedRunId === id) {
          selectedRunId = null;
          detailPanel.hidden = true;
          closeStream();
          return;
        }
        selectedRunId = id;
        detailId.textContent = id;
        eventsList.innerHTML = "";
        detailPanel.hidden = false;
        openStream(id);
      }

      function openStream(id) {
        closeStream();
        const evtSource = new EventSource(`${BACKEND_URL}/agent/runs/${id}`);
        activeEventSource = evtSource;

        evtSource.addEventListener("start", (e) => {
          const data = JSON.parse(e.data);
          appendEvent(`▶ Started: "${data.objective}"`, "start");
        });

        evtSource.addEventListener("progress", (e) => {
          const data = JSON.parse(e.data);
          const prefix = data.code ? "🧩" : "⏳";
          appendEvent(`${prefix} [${data.step}] ${data.detail}`);
        });

        evtSource.addEventListener("done", (e) => {
          const data = JSON.parse(e.data);
          appendEvent("✅ Done!", "done");
          if (data.artifacts && data.artifacts.length) {
            appendEvent(`📦 Generated ${data.artifacts.length} artifacts`);
          }
          evtSource.close();
          activeEventSource = null;
        });

        evtSource.addEventListener("error", () => {
          appendEvent("❌ Connection lost", "error");
          evtSource.close();
          activeEventSource = null;
        });
      }

      function closeStream() {
        if (activeEventSource) {
          activeEventSource.close();
          activeEventSource = null;
        }
      }

      function appendEvent(text, className = "") {
        const li = document.createElement("li");
        li.textContent = text;
        if (className) li.className = className;
        eventsList.appendChild(li);
        li.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    </script>
  </body>
</html>
