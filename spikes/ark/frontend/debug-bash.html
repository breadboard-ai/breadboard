<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ark — Bash Sandbox Debug</title>
    <style>
      :root {
        font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
        color-scheme: dark;
        --bg: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --text-muted: #8b949e;
        --accent: #58a6ff;
        --green: #3fb950;
        --red: #f85149;
        --orange: #d29922;
      }
      * { box-sizing: border-box; margin: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        padding: 1.5rem;
        max-width: 960px;
        margin: 0 auto;
      }
      h1 {
        font-size: 1.3rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        color: var(--text-muted);
        font-size: 0.8rem;
        margin-bottom: 1.5rem;
      }
      .subtitle code {
        color: var(--red);
        background: rgba(248, 81, 73, 0.1);
        padding: 0.1rem 0.3rem;
        border-radius: 3px;
      }

      /* Submission */
      #submit-form {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      #objective {
        flex: 1;
        padding: 0.6rem 0.75rem;
        font-size: 0.9rem;
        font-family: inherit;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        outline: none;
      }
      #objective:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
      }
      #start-btn {
        padding: 0.6rem 1.25rem;
        font-size: 0.9rem;
        font-family: inherit;
        font-weight: 600;
        background: var(--green);
        color: #000;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      #start-btn:hover { opacity: 0.85; }
      #start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

      /* Event log */
      #log {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 1rem;
        min-height: 200px;
        max-height: 70vh;
        overflow-y: auto;
        font-size: 0.8rem;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .ev { padding: 0.1rem 0; }
      .ev-thought { color: var(--text-muted); font-style: italic; }
      .ev-call { color: var(--accent); }
      .ev-update { color: var(--text-muted); }
      .ev-result { color: var(--text); }
      .ev-bash-output {
        color: var(--green);
        background: rgba(63, 185, 80, 0.05);
        padding: 0.25rem 0.5rem;
        margin: 0.15rem 0;
        border-radius: 3px;
        display: block;
      }
      .ev-error { color: var(--red); font-weight: 600; }
      .ev-done { color: var(--green); font-weight: 600; }
      .ev-start { color: var(--orange); font-weight: 600; }
      .ev-outcome {
        color: var(--text);
        background: rgba(88, 166, 255, 0.08);
        border-left: 3px solid var(--accent);
        padding: 0.5rem 0.75rem;
        margin: 0.25rem 0;
        border-radius: 3px;
        line-height: 1.5;
      }

      /* Status bar */
      #status-bar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.75rem;
        font-size: 0.8rem;
        color: var(--text-muted);
        min-height: 1.5rem;
      }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <h1>⚡ Bash Sandbox Agent</h1>
    <p class="subtitle">
      Runs the skilled agent with <code>execute_bash</code> enabled.
      Commands run on the local server.
    </p>

    <div id="submit-form">
      <input
        id="objective"
        type="text"
        placeholder="What should the agent do?"
        autofocus
      />
      <button id="start-btn">Run</button>
    </div>

    <div id="log"></div>
    <div id="status-bar"></div>

    <script type="module">
      const BACKEND_URL = "http://localhost:8080";

      const objectiveInput = document.querySelector("#objective");
      const startBtn = document.querySelector("#start-btn");
      const log = document.querySelector("#log");
      const statusBar = document.querySelector("#status-bar");

      let running = false;

      // ── Submit ──────────────────────────────────────────────
      startBtn.addEventListener("click", startRun);
      objectiveInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") startRun();
      });

      async function startRun() {
        const objective = objectiveInput.value.trim();
        if (!objective || running) return;

        running = true;
        startBtn.disabled = true;
        log.innerHTML = "";

        appendLog(`▶ Objective: "${objective}"`, "ev-start");
        setStatus("Starting…");

        try {
          const res = await fetch(`${BACKEND_URL}/agent/runs/start`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ objective, type: "bash" }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            appendLog(
              `❌ ${err.detail || `Server error ${res.status}`}`,
              "ev-error"
            );
            finish();
            return;
          }
          const { id } = await res.json();
          appendLog(`  Run ID: ${id}`, "");
          streamRun(id);
        } catch (err) {
          appendLog(`❌ Failed to start: ${err.message}`, "ev-error");
          finish();
        }
      }

      // ── SSE Stream ──────────────────────────────────────────
      function streamRun(id) {
        const evtSource = new EventSource(
          `${BACKEND_URL}/agent/runs/${id}`
        );

        evtSource.addEventListener("start", (e) => {
          setStatus("Agent started");
        });

        evtSource.addEventListener("progress", (e) => {
          const data = JSON.parse(e.data);
          const { step, detail } = data;

          if (step === "thinking") {
            appendLog(`💭 ${detail}`, "ev-thought");
            setStatus("Thinking…");
          } else if (step === "working") {
            appendLog(`🔧 ${detail}`, "ev-call");
            setStatus(detail);
          } else if (step === "result") {
            appendLog(detail, "ev-bash-output");
            setStatus("Reading output…");
          } else if (step === "error") {
            appendLog(`❌ ${detail}`, "ev-error");
          } else {
            appendLog(`   ${detail}`, "ev-update");
          }
        });

        evtSource.addEventListener("done", (e) => {
          const data = JSON.parse(e.data);
          appendLog("", "");

          if (data.outcome) {
            appendLog(data.outcome, "ev-outcome");
            appendLog("", "");
          }

          appendLog("✅ Agent finished.", "ev-done");

          if (data.artifacts && data.artifacts.length > 0) {
            appendLog(
              `📦 ${data.artifacts.length} artifact(s): ${data.artifacts.join(", ")}`,
              ""
            );
          }

          evtSource.close();
          finish();
        });

        evtSource.addEventListener("error", () => {
          appendLog("❌ Connection lost", "ev-error");
          evtSource.close();
          finish();
        });
      }

      // ── Helpers ─────────────────────────────────────────────
      function appendLog(text, className) {
        const div = document.createElement("div");
        div.className = `ev ${className || ""}`;
        div.textContent = text;
        log.appendChild(div);
        div.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }

      function setStatus(text) {
        if (text) {
          statusBar.innerHTML = `<div class="spinner"></div><span>${escapeHtml(text)}</span>`;
        } else {
          statusBar.innerHTML = "";
        }
      }

      function finish() {
        running = false;
        startBtn.disabled = false;
        setStatus("");
        objectiveInput.focus();
      }

      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }
    </script>
  </body>
</html>
