<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ark — Bash Sandbox Debug</title>
    <style>
      :root {
        font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
        color-scheme: dark;
        --bg: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --text-muted: #8b949e;
        --accent: #58a6ff;
        --green: #3fb950;
        --red: #f85149;
        --orange: #d29922;
      }
      * { box-sizing: border-box; margin: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        padding: 1.5rem;
        max-width: 960px;
        margin: 0 auto;
      }
      h1 {
        font-size: 1.3rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        color: var(--text-muted);
        font-size: 0.8rem;
        margin-bottom: 1.5rem;
      }
      .subtitle code {
        color: var(--red);
        background: rgba(248, 81, 73, 0.1);
        padding: 0.1rem 0.3rem;
        border-radius: 3px;
      }

      /* Submission */
      #submit-form {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      #objective {
        flex: 1;
        padding: 0.6rem 0.75rem;
        font-size: 0.9rem;
        font-family: inherit;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        outline: none;
      }
      #objective:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
      }
      #start-btn {
        padding: 0.6rem 1.25rem;
        font-size: 0.9rem;
        font-family: inherit;
        font-weight: 600;
        background: var(--green);
        color: #000;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      #start-btn:hover { opacity: 0.85; }
      #start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
      #stop-btn {
        padding: 0.4rem 0.75rem;
        font-size: 0.8rem;
        font-family: inherit;
        font-weight: 600;
        background: var(--red);
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      #stop-btn:hover { opacity: 0.85; }

      /* Run list */
      #runs {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        margin-bottom: 1rem;
      }
      .run-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.5rem 0.75rem;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
        font-size: 0.8rem;
      }
      .run-card:hover {
        border-color: var(--text-muted);
      }
      .run-card.selected {
        border-color: var(--accent);
        background: rgba(88, 166, 255, 0.06);
      }
      .run-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
      }
      .run-objective {
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
      }
      .run-status {
        flex-shrink: 0;
        color: var(--text-muted);
      }
      .run-progress-bar {
        height: 3px;
        background: var(--border);
        border-radius: 2px;
        margin-top: 0.35rem;
        overflow: hidden;
      }
      .run-progress-fill {
        height: 100%;
        background: var(--accent);
        transition: width 0.3s ease;
      }
      .run-card[data-status="complete"] .run-progress-fill {
        background: var(--green);
      }
      .run-artifacts {
        margin-top: 0.35rem;
        font-size: 0.75rem;
      }
      .run-artifacts summary {
        cursor: pointer;
        color: var(--text-muted);
      }
      .run-artifacts a {
        color: var(--accent);
        text-decoration: none;
      }
      .run-artifacts a:hover { text-decoration: underline; }
      .run-artifacts ul {
        list-style: none;
        padding: 0;
        margin: 0.2rem 0 0;
      }
      .run-artifacts li { padding: 0.1rem 0; }

      /* Event log */
      #log {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 1rem;
        min-height: 200px;
        max-height: 70vh;
        overflow-y: auto;
        font-size: 0.8rem;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .ev { padding: 0.1rem 0; }
      .ev-thought { color: var(--text-muted); font-style: italic; }
      .ev-call { color: var(--accent); }
      .ev-update { color: var(--text-muted); }
      .ev-result { color: var(--text); }
      .ev-bash-output {
        color: var(--green);
        background: rgba(63, 185, 80, 0.05);
        padding: 0.25rem 0.5rem;
        margin: 0.15rem 0;
        border-radius: 3px;
        display: block;
      }
      .ev-error { color: var(--red); font-weight: 600; }
      .ev-done { color: var(--green); font-weight: 600; }
      .ev-start { color: var(--orange); font-weight: 600; }
      .ev-outcome {
        color: var(--text);
        background: rgba(88, 166, 255, 0.08);
        border-left: 3px solid var(--accent);
        padding: 0.5rem 0.75rem;
        margin: 0.25rem 0;
        border-radius: 3px;
        line-height: 1.5;
      }

      /* Function call twisties */
      details.ev-fn {
        margin: 0.15rem 0;
        border-left: 2px solid var(--border);
        padding-left: 0.5rem;
      }
      details.ev-fn summary {
        cursor: pointer;
        color: var(--accent);
        font-size: 0.8rem;
        padding: 0.1rem 0;
        list-style: disclosure-closed;
      }
      details.ev-fn[open] summary {
        list-style: disclosure-open;
      }
      details.ev-fn .fn-body {
        padding: 0.25rem 0 0.25rem 0.5rem;
      }

      /* Status bar */
      #status-bar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.75rem;
        font-size: 0.8rem;
        color: var(--text-muted);
        min-height: 1.5rem;
      }
      #status-text {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex: 1;
      }
      #stop-btn { margin-left: auto; }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Empty state */
      .empty-state {
        color: var(--text-muted);
        font-size: 0.85rem;
        text-align: center;
        padding: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>⚡ Bash Sandbox Agent</h1>
    <p class="subtitle">
      Runs the skilled agent with <code>execute_bash</code> enabled.
      Commands run on the local server.
    </p>

    <div id="submit-form">
      <input
        id="objective"
        type="text"
        placeholder="What should the agent do?"
        autofocus
      />
      <button id="start-btn">Run</button>
    </div>

    <div id="log"></div>
    <div id="status-bar">
      <span id="status-text"></span>
      <button id="stop-btn" hidden>Stop</button>
    </div>

    <div id="runs"></div>

    <script type="module">
      const BACKEND_URL = "http://localhost:8080";
      const POLL_INTERVAL_MS = 1500;

      const objectiveInput = document.querySelector("#objective");
      const startBtn = document.querySelector("#start-btn");
      const runsContainer = document.querySelector("#runs");
      const log = document.querySelector("#log");
      const statusBar = document.querySelector("#status-bar");
      const stopBtn = document.querySelector("#stop-btn");

      let selectedRunId = null;
      let activeEventSource = null;
      let pollTimer = null;

      // ── Submit ──────────────────────────────────────────────
      startBtn.addEventListener("click", startRun);
      objectiveInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") startRun();
      });

      async function startRun() {
        const objective = objectiveInput.value.trim();
        if (!objective) return;

        startBtn.disabled = true;
        objectiveInput.value = "";

        try {
          const res = await fetch(`${BACKEND_URL}/agent/runs/start`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ objective, type: "bash" }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            alert(err.detail || `Server error ${res.status}`);
            startBtn.disabled = false;
            return;
          }
          const { id } = await res.json();
          // Select the new run and start streaming.
          selectRun(id);
          startPolling();
        } catch (err) {
          alert(`Failed to start: ${err.message}`);
        }
        startBtn.disabled = false;
      }

      // ── Run list polling ────────────────────────────────────
      async function poll() {
        try {
          const res = await fetch(`${BACKEND_URL}/agent/runs/status`);
          const runs = await res.json();
          renderRunList(runs);

          // Stop polling when all runs are quiescent.
          const hasActive = runs.some((r) => r.status !== "complete");
          if (!hasActive) stopPolling();
        } catch {
          /* ignore transient errors */
        }
      }

      function startPolling() {
        if (pollTimer) return;
        poll();
        pollTimer = setInterval(poll, POLL_INTERVAL_MS);
      }

      function stopPolling() {
        if (!pollTimer) return;
        clearInterval(pollTimer);
        pollTimer = null;
      }

      function renderRunList(runs) {
        // Snapshot which artifact panels are open.
        const openDetails = new Set();
        for (const card of runsContainer.querySelectorAll(".run-card")) {
          const d = card.querySelector("details.run-artifacts");
          if (d?.open) openDetails.add(card.dataset.runId);
        }

        runsContainer.innerHTML = "";
        if (runs.length === 0) {
          runsContainer.innerHTML = `<div class="empty-state">No runs yet. Enter an objective above.</div>`;
          return;
        }

        for (const run of runs) {
          const pct =
            run.total_steps > 0
              ? Math.round((run.progress / run.total_steps) * 100)
              : 0;

          const card = document.createElement("div");
          card.className = `run-card${run.id === selectedRunId ? " selected" : ""}`;
          card.dataset.status = run.status;
          card.dataset.runId = run.id;

          let artifactsHtml = "";
          if (run.artifacts && run.artifacts.length > 0) {
            const isOpen = openDetails.has(run.id) ? " open" : "";
            const links = run.artifacts
              .map(
                (f) =>
                  `<li><a href="${BACKEND_URL}/out/${run.id}/${f}" target="_blank">${f}</a></li>`
              )
              .join("");
            artifactsHtml = `
              <details class="run-artifacts"${isOpen}>
                <summary>📦 ${run.artifacts.length} artifact(s)</summary>
                <ul>${links}</ul>
              </details>
            `;
          }

          card.innerHTML = `
            <div class="run-header">
              <span class="run-objective">${escapeHtml(run.objective)}</span>
              <span class="run-status">${run.status === "complete" ? "✅" : "⏳ " + run.current_step}</span>
            </div>
            <div class="run-progress-bar">
              <div class="run-progress-fill" style="width:${pct}%"></div>
            </div>
            ${artifactsHtml}
          `;
          card.querySelector(".run-header").addEventListener("click", () => selectRun(run.id));
          runsContainer.appendChild(card);
        }
      }

      // ── Run selection / SSE stream ──────────────────────────
      function selectRun(id) {
        if (selectedRunId === id) {
          // Deselect.
          selectedRunId = null;
          closeStream();
          log.innerHTML = "";
          setStatus("");
          renderSelectedHighlight();
          return;
        }
        selectedRunId = id;
        log.innerHTML = "";
        setStatus("");
        renderSelectedHighlight();
        openStream(id);
      }

      function renderSelectedHighlight() {
        for (const card of runsContainer.querySelectorAll(".run-card")) {
          card.classList.toggle("selected", card.dataset.runId === selectedRunId);
        }
      }

      function openStream(id) {
        closeStream();
        currentDetails = null;
        stopBtn.hidden = false;
        stopBtn.onclick = () => cancelRun(id);
        const evtSource = new EventSource(`${BACKEND_URL}/agent/runs/${id}`);
        activeEventSource = evtSource;

        evtSource.addEventListener("start", (e) => {
          const data = JSON.parse(e.data);
          appendLog(`▶ Objective: "${data.objective}"`, "ev-start");
          setStatus("Agent started");
        });

        evtSource.addEventListener("progress", (e) => {
          const data = JSON.parse(e.data);
          const { step, detail } = data;

          if (step === "thinking") {
            currentDetails = null;
            appendLog(`💭 ${detail}`, "ev-thought");
            setStatus("Thinking…");
          } else if (step === "working") {
            const nl = detail.indexOf("\n");
            const summary = nl >= 0 ? detail.slice(0, nl) : detail;
            const body = nl >= 0 ? detail.slice(nl + 1) : "";
            currentDetails = appendFnCall(`🔧 ${summary}`, body);
            setStatus(summary);
          } else if (step === "result") {
            appendToFnDetails(detail, "ev-bash-output");
            setStatus("Reading output…");
          } else if (step === "error") {
            currentDetails = null;
            appendLog(`❌ ${detail}`, "ev-error");
          } else {
            appendLog(`   ${detail}`, "ev-update");
          }
        });

        evtSource.addEventListener("done", (e) => {
          const data = JSON.parse(e.data);
          appendLog("", "");

          if (data.outcome) {
            appendLog(data.outcome, "ev-outcome");
            appendLog("", "");
          }

          appendLog("✅ Agent finished.", "ev-done");

          if (data.artifacts && data.artifacts.length > 0) {
            appendLog(
              `📦 ${data.artifacts.length} artifact(s): ${data.artifacts.join(", ")}`,
              ""
            );
          }

          evtSource.close();
          activeEventSource = null;
          stopBtn.hidden = true;
          setStatus("");
          // Refresh the run list to show final state.
          poll();
        });

        evtSource.addEventListener("error", () => {
          appendLog("❌ Connection lost", "ev-error");
          evtSource.close();
          activeEventSource = null;
          stopBtn.hidden = true;
          setStatus("");
        });
      }

      function closeStream() {
        if (activeEventSource) {
          activeEventSource.close();
          activeEventSource = null;
        }
        stopBtn.hidden = true;
      }

      async function cancelRun(id) {
        stopBtn.disabled = true;
        try {
          await fetch(`${BACKEND_URL}/agent/runs/${id}/cancel`, { method: "POST" });
          appendLog("⛔ Cancellation requested…", "ev-error");
        } catch (e) {
          appendLog(`❌ Cancel failed: ${e.message}`, "ev-error");
        }
        stopBtn.disabled = false;
      }

      // ── DOM helpers ─────────────────────────────────────────
      let currentDetails = null;

      function appendLog(text, className) {
        const div = document.createElement("div");
        div.className = `ev ${className || ""}`;
        div.textContent = text;
        log.appendChild(div);
        div.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }

      function appendFnCall(summary, detail) {
        const details = document.createElement("details");
        details.className = "ev-fn";
        const sum = document.createElement("summary");
        sum.textContent = summary;
        details.appendChild(sum);
        if (detail) {
          const body = document.createElement("div");
          body.className = "fn-body";
          body.textContent = detail;
          details.appendChild(body);
        }
        log.appendChild(details);
        details.scrollIntoView({ behavior: "smooth", block: "nearest" });
        return details;
      }

      function appendToFnDetails(text, className) {
        if (!currentDetails) return;
        const div = document.createElement("div");
        div.className = `fn-body ${className || ""}`;
        div.textContent = text;
        currentDetails.appendChild(div);
        div.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }

      function setStatus(text) {
        const statusText = document.querySelector("#status-text");
        if (text) {
          statusText.innerHTML = `<div class="spinner"></div><span>${escapeHtml(text)}</span>`;
        } else {
          statusText.innerHTML = "";
        }
      }

      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      // ── Bootstrap ───────────────────────────────────────────
      // Initial poll to pick up hydrated runs from disk.
      poll();
    </script>
  </body>
</html>
