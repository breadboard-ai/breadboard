syntax = "proto3";

package sandbox;

// NotSoSafeSandbox capability execution service.
service SandboxService {
  // Execute a named capability against provided files.
  rpc Run (RunRequest) returns (RunResponse);
}

message RunRequest {
  string capability = 1;
  map<string, string> files = 2;
  map<string, string> options = 3;
}

message RunResponse {
  map<string, string> output = 1;
  string logs = 2;
  string error = 3;
}
